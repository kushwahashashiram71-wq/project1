<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
    <center>
        <h2>Pete's Pizza Delivery</h2>
        <h3>Online Order Form</h3>
        <h4>*required field</h4>
    </center>
    <form>
        <fieldset>
            <legend>Customer details</legend>
        <label for="full name">*Name :</label>
        <input type="text" id="full name" placeholder="Enter your name" required>
        <br>
        <label for="address">*Address :</label>
        <input type="text" id="address" placeholder="Enter your address" required>
        <br>
        <label for="city">*Town/city:</label>
        <input type="text" id="city" placeholder="Enter your town/city name" required>
        <br>

        <label for="post">*Postcode :</label>
        <input type="number" id="post" placeholder="Enter your postcode" required>
        <br>
        <label for="tel">*Tel:  </label>
        <input type="tel" id="tel" placeholder="Enter your teliphone number" required minlength="0" maxlength="10" min="0">
        <br>
        <label for="email">*Name :</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <br>
        </fieldset>
    </form>
    <form>
        <fieldset>
        <legend>Topping*</legend>
        <input type="radio" id="a">
        <label for="a">Margherita :</label><br>
        <input type="radio" id="b">
        <lable for="b">Four Seasons</lable><br>
        <input type="radio" id="c">
        <lable for="c">Meat Feast</lable><br>
        </fieldset>

        <fieldset>
        <legend>Size*</legend>
        <input type="radio" id="a">
        <label for="a">Small :</label><br>
        <input type="radio" id="b">
        <lable for="b">Medium</lable><br>
        <input type="radio" id="c">
        <lable for="c">Large</lable><br>
        </fieldset>

        <fieldset>
        <legend>Extras</legend>
        <input type="checkbox" id="a">
        <label for="a">Mushrooms</label><br>
        <input type="checkbox" id="b">
        <lable for="b">Green pepers</lable><br>
        <input type="checkbox" id="c">
        <lable for="c">Anchovies</lable><br>
        <input type="checkbox" id="d">
        <lable for="d">Extra cheese</lable><br>
        </fieldset>
        
        <fieldset>
        <legend>Delivery</legend>
        <label for="a">Preferred delivery time:</label>
        <input type="text" id="a"><br>
        <label for="b">Delivery instructions:</label><br>
        <input type="text" id="b"><br>
        </fieldset>
        </form>
        <center><button type="submit" >Submit order</button></center>
</div>
</body>
</html>
